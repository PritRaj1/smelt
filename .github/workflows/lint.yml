name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check smelt/ tests/ notebooks/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check smelt/ tests/ notebooks/

  c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: "18"
          check-path: smelt/csrc
